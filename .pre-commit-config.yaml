repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        files: ^tests/fixtures/.*\.ya?ml$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        name: ruff check
        args: [--fix]
        files: ^packages/cup_check/

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.18.1
    hooks:
      - id: markdownlint-cli2

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: packages/web/node_modules/.bin/prettier --write
        language: system
        files: ^(packages/web/|tests/fixtures/)
        types_or: [css, html, javascript, json, markdown, ts, tsx, yaml]

      - id: svelte-check
        name: svelte-check
        entry: bash -c 'cd packages/web && npm run check'
        language: system
        files: ^packages/web/.*\.(ts|svelte)$
        pass_filenames: false

      - id: web-test-types
        name: web test type-check
        entry: bash -c 'cd packages/web && npm run check:tests'
        language: system
        files: ^packages/web/.*\.(ts|svelte)$
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: web-coverage
        name: web coverage
        entry: bash -c 'cd packages/web && npm run test:coverage'
        language: system
        pass_filenames: false
        stages: [pre-push]
