[project]
name = "cup-check"
dynamic = ["version"]
description = "Validazione formale locale dei Codici Unici di Progetto (CUP)."
readme = "README.md"
requires-python = ">=3.12"
license = "EUPL-1.2"
authors = [{ name = "Alessandro Saglia" }]
keywords = ["cup", "codice unico progetto", "validazione", "opencup"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: European Union Public Licence 1.2 (EUPL 1.2)",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = []

[project.optional-dependencies]
build = ["pyyaml>=6.0,<7"]

[dependency-groups]
dev = [
  "pre-commit>=4.0",
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "ruff>=0.8",
  "cup-check[build]",
]

[project.urls]
Homepage = "https://github.com/ale-saglia/cup-check"
Repository = "https://github.com/ale-saglia/cup-check"
Issues = "https://github.com/ale-saglia/cup-check/issues"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cup_check"]

[tool.hatch.version]
source = "vcs"

[tool.hatch.version.raw-options]
search_parent_directories = true
tag_regex = '^v(?P<version>\d+\.\d+\.\d+)$'
git_describe_command = 'git describe --dirty --tags --long --match v[0-9]*'

[tool.pytest.ini_options]
addopts = "--cov=cup_check --cov-branch --cov-report=term-missing --cov-report=xml --cov-fail-under=95 --junitxml=junit.xml -o junit_family=legacy"
testpaths = ["tests"]
tmp_path_retention_count = 0
tmp_path_retention_policy = "none"
markers = [
  "integration: test con accesso di rete al release pubblicato (esegui con INTEGRATION_TESTS=1)",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
