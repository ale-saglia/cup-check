<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex" />
    <meta http-equiv="refresh" content="0; url=/" />
    <title></title>
    <script>
      const firstSegment = location.pathname.split('/').filter(Boolean)[0] || '';
      const homePath =
        firstSegment && location.hostname.endsWith('.github.io') ? `/${firstSegment}/` : '/';
      location.replace(`${homePath}${location.search}${location.hash}`);
    </script>
  </head>
  <body></body>
</html>
