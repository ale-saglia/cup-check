- id: edge-whitespace-padded
  description: 'CUP valido con spazi di padding'
  input: '  G17H03000130001  '
  expected:
    outcome: FORMATO_VALIDO_DA_VERIFICARE
    failed_rules: []
    warnings: [N1]

- id: edge-tab-padded
  description: 'CUP valido con tab di padding'
  input: "\tG17H03000130001\t"
  expected:
    outcome: FORMATO_VALIDO_DA_VERIFICARE
    failed_rules: []
    warnings: [N1]

- id: edge-lowercase-typical
  description: 'CUP valido dopo conversione in maiuscolo'
  input: 'g17h03000130001'
  expected:
    outcome: FORMATO_VALIDO_DA_VERIFICARE
    failed_rules: []
    warnings: [N2]

- id: edge-padded-lowercase
  description: 'CUP valido dopo trim e conversione in maiuscolo'
  input: '  g17h03000130001  '
  expected:
    outcome: FORMATO_VALIDO_DA_VERIFICARE
    failed_rules: []
    warnings: [N1, N2]

- id: edge-empty
  description: 'Valore vuoto'
  input: ''
  expected:
    outcome: INVALIDO_FORMATO
    failed_rules: [R0]
    warnings: []

- id: edge-century-rollover-r4
  description: >-
    R4 documenta il limite intrinseco dell'anno CUP a due cifre.
    Il Sistema CUP è operativo dal 2003 (delibera CIPE 143/2002, l. 3/2003 art. 11),
    quindi l'anno a due cifre non è mai ambiguo con date pre-2000.
  input: 'G17H01000130001'
  options:
    current_year: 2100
  expected:
    outcome: INVALIDO_FORMATO
    failed_rules: [R4]
    warnings: []
