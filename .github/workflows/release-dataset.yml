name: Release Dataset

on:
  workflow_dispatch:
    inputs:
      sources_snapshot_date:
        description: 'Data snapshot OpenCUP (YYYY-MM-DD)'
        required: true
        type: string
  schedule:
    # 11:00 UTC = 12:00 CET (inverno); in estate (CEST, UTC+2) scatta alle 13:00 ora di Roma
    - cron: '0 11 5 * *'

permissions:
  contents: read

jobs:
  build:
    name: Build dataset
    runs-on: ubuntu-latest
    outputs:
      dataset_tag: ${{ steps.vars.outputs.dataset_tag }}
      snapshot_date: ${{ steps.vars.outputs.snapshot_date }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: packages/cup_check/uv.lock

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked
        working-directory: packages/cup_check

      - name: Resolve snapshot date and tag
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.sources_snapshot_date }}" ]; then
            SNAPSHOT_DATE="${{ github.event.inputs.sources_snapshot_date }}"
          else
            SNAPSHOT_DATE="$(date -u +%Y-%m-01)"
          fi
          DATASET_TAG="dataset-${SNAPSHOT_DATE:0:7}"
          RELEASE_BASE_URL="https://github.com/${{ github.repository }}/releases/download/${DATASET_TAG}"
          echo "snapshot_date=${SNAPSHOT_DATE}" >> "$GITHUB_OUTPUT"
          echo "dataset_tag=${DATASET_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_base_url=${RELEASE_BASE_URL}" >> "$GITHUB_OUTPUT"

      - name: Build dataset
        run: |
          uv run python ../../scripts/build_dataset.py \
            "${{ steps.vars.outputs.snapshot_date }}" \
            "../../dist/dataset" \
            "${{ steps.vars.outputs.release_base_url }}"
        working-directory: packages/cup_check

      - uses: actions/upload-artifact@v4
        with:
          name: dataset-${{ steps.vars.outputs.dataset_tag }}
          path: dist/dataset/
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dataset-${{ needs.build.outputs.dataset_tag }}
          path: dist/dataset/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.build.outputs.dataset_tag }}"
          SNAPSHOT="${{ needs.build.outputs.snapshot_date }}"
          CHUNK_FILES=($(ls dist/dataset/cups.sqlite.*))
          gh release delete "$TAG" --cleanup-tag --yes \
            --repo "${{ github.repository }}" 2>/dev/null || true
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Dataset OpenCUP ${TAG}" \
            --notes "Dataset OpenCUP aggiornato al ${SNAPSHOT}." \
            --latest=false \
            dist/dataset/dataset-manifest.json \
            "${CHUNK_FILES[@]}"

  deploy-d1:
    name: Deploy dataset to Cloudflare D1
    runs-on: ubuntu-latest
    needs: [build, release]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dataset-${{ needs.build.outputs.dataset_tag }}
          path: dist/dataset/

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate SQL dump from SQLite
        run: |
          python3 - <<'EOF'
          import sqlite3
          conn = sqlite3.connect('dist/dataset/cups.sqlite')
          with open('d1_import.sql', 'w') as f:
              f.write('DROP TABLE IF EXISTS cups;\n')
              f.write('CREATE TABLE cups (cup TEXT PRIMARY KEY) WITHOUT ROWID;\n')
              batch = []
              for (cup,) in conn.execute('SELECT cup FROM cups ORDER BY cup'):
                  batch.append("('" + cup.replace("'", "''") + "')")
                  if len(batch) >= 500:
                      f.write('INSERT INTO cups VALUES ' + ','.join(batch) + ';\n')
                      batch = []
              if batch:
                  f.write('INSERT INTO cups VALUES ' + ','.join(batch) + ';\n')
          conn.close()
          EOF

      - name: Import dataset into D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@latest d1 execute cup-check-dataset --file d1_import.sql --remote
