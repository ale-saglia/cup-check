name: Release Dataset

on:
  workflow_dispatch:
    inputs:
      sources_snapshot_date:
        description: 'Data snapshot OpenCUP (YYYY-MM-DD)'
        required: true
        type: string
  schedule:
    # 11:00 UTC = 12:00 CET (inverno); in estate (CEST, UTC+2) scatta alle 13:00 ora di Roma
    - cron: '0 11 5 * *'

permissions:
  contents: read

env:
  DATASET_RETENTION_MONTHS: 3
  OPENCUP_OPEN_DATA_URL: https://www.opencup.gov.it/portale/web/opencup/accesso-agli-open-data
  OPENCUP_PROJECTS_URL: https://www.opencup.gov.it/portale/documents/21195/299152/OpendataProgetti.zip/

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build dataset
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      dataset_tag: ${{ steps.vars.outputs.dataset_tag }}
      snapshot_date: ${{ steps.vars.outputs.snapshot_date }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: packages/cup_check/uv.lock

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --locked
        working-directory: packages/cup_check

      - name: Resolve snapshot date and tag
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.sources_snapshot_date }}" ]; then
            SNAPSHOT_DATE="${{ github.event.inputs.sources_snapshot_date }}"
          else
            SNAPSHOT_DATE="$(date -u +%Y-%m-01)"
          fi
          DATASET_TAG="dataset-${SNAPSHOT_DATE:0:7}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          CUP_INDEX_BASE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/datasets/${DATASET_TAG}"
          {
            echo "snapshot_date=${SNAPSHOT_DATE}"
            echo "dataset_tag=${DATASET_TAG}"
            echo "cup_index_base_url=${CUP_INDEX_BASE_URL}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve OpenCUP projects URL
        id: opencup
        run: |
          python - <<'PY'
          import os
          from html.parser import HTMLParser
          from urllib.parse import urljoin
          from urllib.request import Request, urlopen

          class ProjectsLinkParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.urls = []

              def handle_starttag(self, tag, attrs):
                  if tag != 'a':
                      return
                  href = dict(attrs).get('href')
                  if href and 'OpendataProgetti.zip' in href:
                      self.urls.append(href)

          fallback_url = os.environ['OPENCUP_PROJECTS_URL']
          page_url = os.environ['OPENCUP_OPEN_DATA_URL']
          projects_url = fallback_url
          try:
              request = Request(page_url, headers={'User-Agent': 'cup-check-dataset-release/1'})
              with urlopen(request, timeout=60) as response:
                  html = response.read().decode('utf-8', errors='replace')
              parser = ProjectsLinkParser()
              parser.feed(html)
              if parser.urls:
                  projects_url = urljoin(page_url, parser.urls[0])
          except OSError as exc:
              print(f'OpenCUP projects URL discovery failed, using fallback: {exc}')
          print(f'projects_url={projects_url}')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f'projects_url={projects_url}\n')
          PY

      - name: Download OpenCUP dump
        run: |
          set -euo pipefail
          mkdir -p data
          curl "${{ steps.opencup.outputs.projects_url }}" \
            --fail \
            --location \
            --retry 8 \
            --retry-all-errors \
            --retry-delay 30 \
            --connect-timeout 60 \
            --speed-limit 262144 \
            --speed-time 300 \
            --max-time 7200 \
            --continue-at - \
            --output data/OpendataProgetti.zip

      - name: Build dataset
        run: |
          uv run python ../../scripts/build_dataset.py \
            --skip-if-exists \
            "${{ steps.vars.outputs.snapshot_date }}" \
            "../../dist/dataset" \
            "${{ steps.vars.outputs.cup_index_base_url }}" \
            "../../data/OpendataProgetti.zip"
        working-directory: packages/cup_check

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign manifest with cosign (keyless OIDC)
        env:
          COSIGN_YES: 'true'
        run: |
          cosign sign-blob \
            --bundle dist/dataset/dataset-manifest.json.sigstore.json \
            dist/dataset/dataset-manifest.json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dataset-${{ steps.vars.outputs.dataset_tag }}
          path: dist/dataset/
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dataset-${{ needs.build.outputs.dataset_tag }}
          path: dist/dataset/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          TAG="${{ needs.build.outputs.dataset_tag }}"
          SNAPSHOT="${{ needs.build.outputs.snapshot_date }}"
          CHUNK_FILES=(dist/dataset/cup-index.sqlite.*)
          [[ ${#CHUNK_FILES[@]} -gt 0 ]] || { echo "::error::no chunks built"; exit 1; }
          gh release delete "$TAG" --cleanup-tag --yes \
            --repo "${{ github.repository }}" 2>/dev/null || true
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Dataset OpenCUP ${TAG}" \
            --notes "Dataset OpenCUP aggiornato al ${SNAPSHOT}." \
            --latest=false \
            dist/dataset/dataset-manifest.json \
            dist/dataset/dataset-manifest.json.sigstore.json \
            dist/dataset/dataset-latest.json \
            "${CHUNK_FILES[@]}"

      - name: Prune old dataset releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RETENTION_MONTHS="${DATASET_RETENTION_MONTHS}"
          if ! [[ "$RETENTION_MONTHS" =~ ^[0-9]+$ ]] || [ "$RETENTION_MONTHS" -lt 1 ]; then
            echo "::error::DATASET_RETENTION_MONTHS must be a positive integer"
            exit 1
          fi

          CURRENT_TAG="${{ needs.build.outputs.dataset_tag }}"
          SNAPSHOT_DATE="${{ needs.build.outputs.snapshot_date }}"
          SNAPSHOT_MONTH="${SNAPSHOT_DATE:0:7}"
          RETENTION_AGE_MONTHS=$((RETENTION_MONTHS - 1))
          CUTOFF_MONTH="$(date -u -d "${SNAPSHOT_MONTH}-01 -${RETENTION_AGE_MONTHS} months" +%Y-%m)"

          echo "Keeping dataset releases from dataset-${CUTOFF_MONTH} onward."
          gh release list \
            --repo "${{ github.repository }}" \
            --limit 200 \
            --json tagName \
            --jq '.[] | select(.tagName | test("^dataset-[0-9]{4}-[0-9]{2}$")) | .tagName' |
            while IFS= read -r TAG; do
              [ -n "$TAG" ] || continue
              [ "$TAG" != "$CURRENT_TAG" ] || continue

              DATASET_MONTH="${TAG#dataset-}"
              if [[ "$DATASET_MONTH" < "$CUTOFF_MONTH" ]]; then
                echo "Deleting expired dataset release ${TAG}"
                gh release delete "$TAG" --cleanup-tag --yes \
                  --repo "${{ github.repository }}"
              fi
            done

  deploy-pages:
    name: Publish dataset on pinned web
    runs-on: ubuntu-latest
    needs: [build, release]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Prepare pinned web
        uses: ./.github/actions/prepare-pinned-web
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dataset-${{ needs.build.outputs.dataset_tag }}
          path: dist/dataset/

      - name: Add latest dataset files
        run: |
          TAG="${{ needs.build.outputs.dataset_tag }}"
          mkdir -p "dist/pages-root/datasets/${TAG}"
          cp dist/dataset/dataset-latest.json dist/pages-root/dataset-latest.json
          cp dist/dataset/dataset-manifest.json "dist/pages-root/datasets/${TAG}/dataset-manifest.json"
          cp dist/dataset/dataset-manifest.json.sigstore.json "dist/pages-root/datasets/${TAG}/dataset-manifest.json.sigstore.json"
          cp dist/dataset/cup-index.sqlite.* "dist/pages-root/datasets/${TAG}/"

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: dist/pages-root
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
