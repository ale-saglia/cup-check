name: Release Dataset

on:
  workflow_dispatch:
    inputs:
      sources_snapshot_date:
        description: 'Data snapshot OpenCUP (YYYY-MM-DD)'
        required: true
        type: string
  schedule:
    # 11:00 UTC = 12:00 CET (inverno); in estate (CEST, UTC+2) scatta alle 13:00 ora di Roma
    - cron: '0 11 5 * *'

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build dataset
    runs-on: ubuntu-latest
    outputs:
      dataset_tag: ${{ steps.vars.outputs.dataset_tag }}
      snapshot_date: ${{ steps.vars.outputs.snapshot_date }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: packages/cup_check/uv.lock

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked
        working-directory: packages/cup_check

      - name: Resolve snapshot date and tag
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.sources_snapshot_date }}" ]; then
            SNAPSHOT_DATE="${{ github.event.inputs.sources_snapshot_date }}"
          else
            SNAPSHOT_DATE="$(date -u +%Y-%m-01)"
          fi
          DATASET_TAG="dataset-${SNAPSHOT_DATE:0:7}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          CUP_INDEX_BASE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/datasets/${DATASET_TAG}"
          echo "snapshot_date=${SNAPSHOT_DATE}" >> "$GITHUB_OUTPUT"
          echo "dataset_tag=${DATASET_TAG}" >> "$GITHUB_OUTPUT"
          echo "cup_index_base_url=${CUP_INDEX_BASE_URL}" >> "$GITHUB_OUTPUT"

      - name: Build dataset
        run: |
          uv run python ../../scripts/build_dataset.py \
            "${{ steps.vars.outputs.snapshot_date }}" \
            "../../dist/dataset" \
            "${{ steps.vars.outputs.cup_index_base_url }}"
        working-directory: packages/cup_check

      - uses: actions/upload-artifact@v4
        with:
          name: dataset-${{ steps.vars.outputs.dataset_tag }}
          path: dist/dataset/
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dataset-${{ needs.build.outputs.dataset_tag }}
          path: dist/dataset/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.build.outputs.dataset_tag }}"
          SNAPSHOT="${{ needs.build.outputs.snapshot_date }}"
          CHUNK_FILES=($(ls dist/dataset/cup-index.sqlite.*))
          gh release delete "$TAG" --cleanup-tag --yes \
            --repo "${{ github.repository }}" 2>/dev/null || true
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Dataset OpenCUP ${TAG}" \
            --notes "Dataset OpenCUP aggiornato al ${SNAPSHOT}." \
            --latest=false \
            dist/dataset/dataset-manifest.json \
            dist/dataset/dataset-latest.json \
            "${CHUNK_FILES[@]}"

  deploy-pages:
    name: Publish dataset on pinned web
    runs-on: ubuntu-latest
    needs: [build, release]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Resolve latest software release
        id: software
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SOFTWARE_TAG="$(gh release list \
            --repo "${{ github.repository }}" \
            --exclude-drafts \
            --exclude-pre-releases \
            --limit 100 \
            --json tagName,publishedAt \
            --jq '[.[] | select(.tagName | test("^v[0-9]"))] | sort_by(.publishedAt) | last | .tagName')"
          if [ -z "$SOFTWARE_TAG" ] || [ "$SOFTWARE_TAG" = "null" ]; then
            echo "No published GitHub Release v* found, falling back to latest git tag." >&2
            SOFTWARE_TAG="$(gh api "repos/${{ github.repository }}/tags" \
              --jq '[.[] | select(.name | test("^v[0-9]"))] | sort_by(.name) | last | .name')"
          fi
          if [ -z "$SOFTWARE_TAG" ] || [ "$SOFTWARE_TAG" = "null" ]; then
            echo "No software tag v* was found." >&2
            exit 1
          fi
          echo "tag=${SOFTWARE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Download latest pinned web artifact
        id: web_artifact
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/web dist/pages-root
          gh release download "${{ steps.software.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern web-dist.tar.gz \
            --dir dist/web
          tar -xzf dist/web/web-dist.tar.gz -C dist/pages-root

      - uses: actions/checkout@v4
        if: steps.web_artifact.outcome == 'failure'
        with:
          ref: ${{ steps.software.outputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        if: steps.web_artifact.outcome == 'failure'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/web/package-lock.json

      - name: Build latest software release web
        if: steps.web_artifact.outcome == 'failure'
        run: |
          npm ci
          npm run build
          mkdir -p ../../dist/pages-root
          cp -a dist/. ../../dist/pages-root/
        working-directory: packages/web

      - uses: actions/download-artifact@v4
        with:
          name: dataset-${{ needs.build.outputs.dataset_tag }}
          path: dist/dataset/

      - name: Add latest dataset files
        run: |
          TAG="${{ needs.build.outputs.dataset_tag }}"
          mkdir -p "dist/pages-root/datasets/${TAG}"
          cp dist/dataset/dataset-latest.json dist/pages-root/dataset-latest.json
          cp dist/dataset/dataset-manifest.json "dist/pages-root/datasets/${TAG}/dataset-manifest.json"
          cp dist/dataset/cup-index.sqlite.* "dist/pages-root/datasets/${TAG}/"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages-root
      - id: deployment
        uses: actions/deploy-pages@v4
