name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    name: Web lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:coverage
      - uses: codecov/codecov-action@v6
        if: ${{ !cancelled() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/web/junit.xml
          flags: web
          fail_ci_if_error: true
          report_type: test_results
      - uses: codecov/codecov-action@v6
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          files: packages/web/coverage/lcov.info
          flags: web
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Audit runtime dependencies
        working-directory: .
        run: make web-audit
      - run: npm run build
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  python-matrix:
    name: Prepare Python matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      coverage-python-version: ${{ steps.matrix.outputs.coverage-python-version }}
    steps:
      - uses: actions/checkout@v6
      - id: matrix
        run: python scripts/python_matrix.py --github-output "$GITHUB_OUTPUT"

  python:
    name: Python lint and test (${{ matrix.python-version }})
    needs: python-matrix
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.python-matrix.outputs.matrix) }}
    defaults:
      run:
        working-directory: packages/cup_check
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: packages/cup_check/uv.lock
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --dev --locked
      - run: uv run ruff check .
      - run: uv run pytest
      - uses: codecov/codecov-action@v6
        if: ${{ !cancelled() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/cup_check/junit.xml
          flags: python
          fail_ci_if_error: true
          report_type: test_results
      - uses: codecov/codecov-action@v6
        if: ${{ matrix.python-version == needs.python-matrix.outputs.coverage-python-version && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        with:
          files: packages/cup_check/coverage.xml
          flags: python
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  python-integration:
    name: Python integration tests (published dataset)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: packages/cup_check
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: packages/cup_check/uv.lock
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --dev --locked
      - run: INTEGRATION_TESTS=1 uv run pytest -m integration --override-ini="addopts="
