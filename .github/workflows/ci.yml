name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    name: Web lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --run
      - name: Audit runtime dependencies
        working-directory: .
        run: make web-audit
      - run: npm run build

  python:
    name: Python lint and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cup_check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: packages/cup_check/uv.lock
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --dev --locked
      - run: uv run ruff check .
      - run: uv run pytest
      - uses: codecov/codecov-action@v5
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          files: packages/cup_check/coverage.xml
          flags: python
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  python-integration:
    name: Python integration tests (published dataset)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: packages/cup_check
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: packages/cup_check/uv.lock
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --dev --locked
      - run: INTEGRATION_TESTS=1 uv run pytest -m integration --override-ini="addopts="
