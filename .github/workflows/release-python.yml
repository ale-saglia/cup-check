name: Release Python

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag software vX.Y.Z da pubblicare su PyPI"
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Resolve software tag
        id: release
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$DISPATCH_TAG"
          else
            TAG="$REF_NAME"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            {
              echo "### Tag software non valido"
              echo ""
              echo "Valore ricevuto: \`$TAG\`"
              echo ""
              echo "Usa il formato \`vX.Y.Z\`, per esempio \`v0.3.0\`."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "Tag software non valido: $TAG" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: packages/cup_check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.tag }}
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: packages/cup_check/uv.lock
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --dev --locked
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv build
      - name: Check distribution version
        shell: bash
        run: |
          VERSION="${{ needs.validate.outputs.version }}"

          test -f "dist/cup_check-${VERSION}-py3-none-any.whl"
          test -f "dist/cup_check-${VERSION}.tar.gz"
      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: packages/cup_check/dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/cup-check/
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
