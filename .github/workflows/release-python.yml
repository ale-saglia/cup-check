name: Release Python

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag software vX.Y.Z da pubblicare su PyPI"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cup_check
    steps:
      - name: Resolve software tag
        id: release
        shell: bash
        working-directory: .
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag software non valido: $TAG" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.tag }}
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: packages/cup_check/uv.lock
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --dev --locked
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv build
      - name: Check distribution version
        shell: bash
        run: |
          VERSION="${{ steps.release.outputs.tag }}"
          VERSION="${VERSION#v}"

          test -f "dist/cup_check-${VERSION}-py3-none-any.whl"
          test -f "dist/cup_check-${VERSION}.tar.gz"
      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: packages/cup_check/dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/cup-check/
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
