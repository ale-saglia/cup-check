name: Release Python

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag software vX.Y.Z da pubblicare su PyPI'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Resolve software tag
        id: release
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$DISPATCH_TAG"
          else
            TAG="$REF_NAME"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            {
              echo "### Tag software non valido"
              echo ""
              echo "Valore ricevuto: \`$TAG\`"
              echo ""
              echo "Usa il formato \`vX.Y.Z\`, per esempio \`v0.3.0\`."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "Tag software non valido: $TAG" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: packages/cup_check
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.tag }}
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: packages/cup_check/uv.lock
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - run: uv sync --dev --locked
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv build
      - name: Generate Python SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: packages/cup_check
          format: cyclonedx-json
          output-file: python-sbom.cdx.json
          artifact-name: python-sbom
          upload-artifact: false
          upload-release-assets: false
      - name: Check distribution version
        shell: bash
        run: |
          VERSION="${{ needs.validate.outputs.version }}"

          test -f "dist/cup_check-${VERSION}-py3-none-any.whl"
          test -f "dist/cup_check-${VERSION}.tar.gz"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-distributions
          path: packages/cup_check/dist/
          if-no-files-found: error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-sbom
          path: python-sbom.cdx.json
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/cup-check/
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          attestations: true
