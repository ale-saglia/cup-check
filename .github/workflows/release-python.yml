name: Release Python

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cup_check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: packages/cup_check/uv.lock
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --dev --locked
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: packages/cup_check/dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/cup-check/
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
