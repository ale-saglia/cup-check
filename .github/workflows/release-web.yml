name: Release web

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish web release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Generate web SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: packages/web
          format: cyclonedx-json
          output-file: web-sbom.cdx.json
          artifact-name: web-sbom
          upload-artifact: false
          upload-release-assets: false
      - name: Pack pinned web artifact
        run: tar -czf ../../web-dist.tar.gz -C dist .
      - name: Attach pinned web artifact to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NO_V="${VERSION#v}"
          # Estrae la sezione del CHANGELOG corrispondente alla versione corrente
          NOTES=$(awk "p && /^## /{exit} /^## ${VERSION_NO_V} /{p=1} p" ../../CHANGELOG.md \
            | sed '1d' | sed -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba}')
          if [ -z "$NOTES" ]; then
            NOTES="Release software ${VERSION}."
          fi
          gh release view "$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create "$VERSION" \
              --repo "${{ github.repository }}" \
              --title "$VERSION" \
              --notes "$NOTES"
          gh release upload "$VERSION" ../../web-dist.tar.gz ../../web-sbom.cdx.json \
            --repo "${{ github.repository }}" \
            --clobber
