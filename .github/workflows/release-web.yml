name: Release web

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish web release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Pack pinned web artifact
        run: tar -czf ../../web-dist.tar.gz -C dist .
      - name: Attach pinned web artifact to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NO_V="${VERSION#v}"
          # Estrae la sezione del CHANGELOG corrispondente alla versione corrente
          NOTES=$(awk "p && /^## /{exit} /^## ${VERSION_NO_V} /{p=1} p" ../../CHANGELOG.md \
            | sed '1d' | sed -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba}')
          if [ -z "$NOTES" ]; then
            NOTES="Release software ${VERSION}."
          fi
          gh release view "$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create "$VERSION" \
              --repo "${{ github.repository }}" \
              --title "$VERSION" \
              --notes "$NOTES"
          gh release upload "$VERSION" ../../web-dist.tar.gz \
            --repo "${{ github.repository }}" \
            --clobber
