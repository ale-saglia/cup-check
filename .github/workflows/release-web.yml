name: Release web

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Include latest dataset in Pages deployment
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release list \
            --repo "${{ github.repository }}" \
            --json tagName \
            --jq '[.[].tagName | select(startswith("dataset-"))] | sort | last')
          gh release download "$TAG" \
            --dir packages/web/dist/dataset \
            --repo "${{ github.repository }}"
          node -e "
            const fs = require('fs');
            const p = 'packages/web/dist/dataset/dataset-manifest.json';
            const m = JSON.parse(fs.readFileSync(p));
            m.chunks.base_url = 'https://ale-saglia.github.io/cup-check/dataset';
            fs.writeFileSync(p, JSON.stringify(m));
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist
      - id: deployment
        uses: actions/deploy-pages@v4
