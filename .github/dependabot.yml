version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/packages/web"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/packages/cup_check"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      pip-dependencies:
        patterns:
          - "*"
