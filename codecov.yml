coverage:
  status:
    project:
      default: off
      python:
        # "auto" segnala regressioni rispetto al commit base senza un floor assoluto.
        # Il gate locale --cov-fail-under=95 in pytest già blocca la build prima di CI.
        target: auto
        flags:
          - python
      web:
        # Stessa strategia: rileva regressioni, non impone soglia assoluta.
        # Gate locali: lines ≥ 95%, branches ≥ 90% in Vitest.
        target: auto
        flags:
          - web
    patch:
      default:
        # "auto" segnala regressioni nel diff senza bloccare su gap pre-esistenti.
        target: auto

ignore:
  - "packages/cup_check/tests/**"

flags:
  python:
    paths:
      - packages/cup_check/
  web:
    paths:
      - packages/web/src/
